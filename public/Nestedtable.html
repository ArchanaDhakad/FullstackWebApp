<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested table</title>
</head>
<body>
    <table width="600" border="1" cellspacing="10px" cellpadding="10px">
        <!-- First Row: Shoes -->
        <tr align="center">
            <td>
                <img src="assets/shoes.jpg" alt="shoes" width="100px" height="100px">
            </td>
            <td>
                <table frame="box" rules="all" width="100%">
                    <tr align="center">
                        <td>Name</td>
                        <td>nike casuals</td>
                    </tr>
                    <tr align="center">
                        <td>price</td>
                        <td>$50</td>   
                    </tr>
                    <tr align="center">
                        <td>stock</td>
                        <td>available</td>
                    </tr>
                </table>
            </td>
        </tr>

        <!-- Second Row: Fashion -->
        <tr align="center">
            <td>
                <img src="assets/fashion.jpg" width="100" height="100">
            </td>
            <td>
                <table frame="box" rules="all" width="100%">
                    <tr align="center">
                        <td>Name</td>
                        <td>Fashion</td>
                    </tr>
                    <tr align="center">
                        <td>price</td>
                        <td>rs5000.756</td>
                    </tr>
                    <tr align="center">
                        <td>stock</td>
                        <td>available</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
