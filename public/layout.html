<!DOCTYPE html>
<html lang="en">
    <head>
    <title>Webpage Title</title>
    <style>
        header,footer{
            background-color: rgb(238, 114, 80);
            color: white;
            padding: 10px;
            border: 1px solid rgb(154, 116, 13);
            border-radius: 0%;
        }
        section{
            height: 400px;
            background-color: rgba(203, 110, 110, 0.878);
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            color: rgb(238, 237, 242);
            padding: 20px;
            margin-top: 20px;
        }
        nav div {
            border: 1px solid rgb(163, 113, 93);
            padding: 10px;
            margin: 10px;
            font-size: 20px;
            border-radius : 10px;
        }
        footer{
            div{
                border: 1px solid rgb(191, 91, 146);
                padding: 10px;
                margin: 10px;
        }
            background-color: rgb(134, 91, 152);
            color: rgb(245, 231, 241);
            padding: 10px;
        }
        main{
            background-color: rgb(245, 145, 102);
            color: rgb(223, 245, 252);
            padding: 10px;
            margin: 10px;
        }
        aside{
            background-color: rgb(168, 85, 131);
            color: rgb(246, 234, 234);
            padding: 10px;
            margin: 10px;
            width: 100px;
            text-align: center;
            border: 2px dotted silver;
        }
        dialog{
            background-color: rgb(114, 134, 150);
            color: black;
            padding: 10px;
            margin: 10px;
        }
        article{
            width: 50px;
            background-color: rgb(102, 117, 147);
            color: rgb(97, 181, 238);
            padding: 10px;
            margin-left: 10px;
            text-align: center;
            font-size: 15px;
        }
        figure{
            background-color: rgb(222, 157, 95);
            color: black;
            padding: 10px;
            margin: 10px;
            border: 2px solid black;
            text-align: center;
        }

    </style>
    </head>
    <body>
        <header>
           <div>Amozon shopping</div>
        </header>
        <section>
            <nav>
                <MENU>
                  <div>Home</div>
                  <div>About</div>
                  <div>Contact</div>
                </MENU>
            </nav>
            <main>
                <dialog open>Any help</dialog>
                <div>welcome to online shopping app</div>
                <article>70% on Electronic</article>
                <figure>
                    your image
                    <figCaption>samsung TV </figCaption>
                </figure>
            </main>
            <aside>ad here............</aside>
            <div>
                
            </div>
            <div>

            </div>
            <div></div>
        </section>
        <footer>
            <div>Copyright @2024</div>
        </footer>
    </body>
</html>
