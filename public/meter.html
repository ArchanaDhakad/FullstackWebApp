<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meter</title>
    <style>
        meter {
            width: 100%;
            height: 20px;
        }
    </style>
</head>
<body>
    <fieldset>
        <legend>Password strength</legend>
        <dl>
            <dt>Strong password</dt>
            <dd>1<meter min="1" max="100" value="100"></meter>100</dd>

            <dt>weak password</dt>
            <dd>1<meter min="1" max="100" value="90" low="20" high="80"></meter>100</dd>

            <dt>poor password</dt>
            <dd><meter min="1" max="100" value="100" low="60" high="80"></meter></dd>
        </dl>
    </fieldset>
    
</body>
</html>
