<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>button</title>
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
</head>
<body>
  <form>
    <fieldset>
      <legend>Register user</legend>
      <dl>
        <dt>User Name</dt>
        <dd><input type="text" placeholder="Enter username" required></dd>
        <dt>Password</dt>

      </dl>
      <button type="submit" name="action" value="register"class="btn btn-primary">Register</button>
      <button type="reset" name="action" value="reset" class="btn btn-secondary">Reset</button>
      <button type="button" name="action" value="cancel" class="btn btn-danger">Cancel</button>

      <br><br>
      test :<input type="text"pattern="colou?r?" placeholder=" enter your test" name="text" >

  </form>
